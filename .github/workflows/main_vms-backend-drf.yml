name: Build and deploy Python app to Azure Web App - vms-backend-drf

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt
          pip install gunicorn whitenoise

      - name: Create Procfile
        run: |
          echo "web: gunicorn visitor_management.wsgi:application --bind=0.0.0.0:8000" > Procfile

      - name: Create runtime.txt
        run: |
          echo "python-3.10" > runtime.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F198E48E2223493297A2375B64D6076D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D4A514144F9D4E8593263DFF579AA6F5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AFB703BA82514FB3A2155B703893A1CB }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'vms-backend-drf'
          slot-name: 'Production'
          package: .
          
      - name: Set App Settings
        run: |
          az webapp config appsettings set \
            --name vms-backend-drf \
            --resource-group vims-rg \
            --settings \
              DJANGO_SETTINGS_MODULE="visitor_management.settings.production" \
              WEBSITE_RUN_FROM_PACKAGE="0" \
              SCM_DO_BUILD_DURING_DEPLOYMENT="true"
